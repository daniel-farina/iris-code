name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # MLX (the model runtime MTPLX is built on) is Apple-Silicon
          # only, so a Linux or Intel-Mac install would have nothing to
          # talk to. We only build darwin-arm64. Triple matches the
          # legacy install.sh naming so the existing `curl ... | sh`
          # one-liner keeps working across the Rust→TS transition.
          - os: macos-14
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: install deps
        run: bun install || true

      - name: package tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="hip-${VERSION}"
          mkdir -p "$STAGE"
          # Source-style distribution: ship the bun launcher + src/. End
          # users need bun on PATH. (We don't ship a compiled binary
          # because Ink's react-devtools-core import breaks bun-build
          # bundling - see hip-ts-layout memory.)
          cp -r bin src assets package.json tsconfig.json vitest.config.ts biome.json README.md "$STAGE/" 2>/dev/null || true
          # An installer script the user can run from inside the unpacked tarball.
          cat > "$STAGE/install.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          if ! command -v bun >/dev/null 2>&1; then
            echo "error: 'bun' not found on PATH. Install from https://bun.sh first."
            exit 1
          fi
          ROOT="$(cd "$(dirname "$0")" && pwd)"
          bun install --cwd "$ROOT" >/dev/null
          PREFIX="${PREFIX:-/usr/local}"
          install -d "$PREFIX/bin"
          # Symlink so updates in $ROOT propagate without re-symlinking.
          ln -sf "$ROOT/bin/hip" "$PREFIX/bin/hip"
          echo "installed: $PREFIX/bin/hip -> $ROOT/bin/hip"
          echo "run 'hip --version' to verify."
          EOF
          chmod +x "$STAGE/install.sh"
          tar -czf "hip-${VERSION}-${{ matrix.target }}.tar.gz" "$STAGE"
          shasum -a 256 "hip-${VERSION}-${{ matrix.target }}.tar.gz" > "hip-${VERSION}-${{ matrix.target }}.tar.gz.sha256"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hip-${{ matrix.target }}
          path: |
            hip-*-${{ matrix.target }}.tar.gz
            hip-*-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

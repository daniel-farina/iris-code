name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck + lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: install ripgrep (search tool dep)
        run: sudo apt-get install -y ripgrep

      - name: install deps
        run: bun install --frozen-lockfile || bun install

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: vitest
        run: bunx vitest run

      - name: bun test (incl. test-game)
        run: bun test
